name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    name: Type-check · Lint · Test · Security · E2E · Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # ── Node setup ────────────────────────────────────────────────────────
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      # ── Python setup ──────────────────────────────────────────────────────
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install Python deps
        run: pip install -r scripts/requirements.txt -r scripts/requirements-dev.txt

      # ── TypeScript gates ──────────────────────────────────────────────────
      - name: Type check (TS)
        run: npx tsc --noEmit

      - name: Lint (ESLint)
        run: npx eslint src/ --max-warnings 0

      # ── Python gates ──────────────────────────────────────────────────────
      - name: Lint (ruff)
        run: ruff check scripts/

      - name: Type check (mypy)
        run: mypy scripts/ --strict

      # ── Security SAST ─────────────────────────────────────────────────────
      - name: Security SAST (semgrep TS)
        run: npx semgrep --config=p/typescript --config=p/owasp-top-ten src/ --error

      - name: Security SAST (bandit Python)
        run: bandit -r scripts/ -ll

      # ── Unit tests ────────────────────────────────────────────────────────
      - name: Unit tests (vitest)
        run: npx vitest run

      - name: Unit tests (pytest)
        run: pytest scripts/ -m "not integration"

      # ── E2E / smoke tests ─────────────────────────────────────────────────
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: E2E smoke tests
        run: npx playwright test --grep @smoke
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}

      # ── Build ─────────────────────────────────────────────────────────────
      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}

  # ── Integration tests (Supabase local stack) ──────────────────────────────
  # Runs on every push and PR. Spins up a local Supabase stack, applies all
  # migrations from cold state, then runs the @integration-marked pytest suite.
  # A missing migration (root cause of #204) will cause get_movie_detail /
  # get_tv_detail RPC tests to fail here, before any deploy happens.
  integration:
    name: Integration tests (RPC / Supabase)
    runs-on: ubuntu-latest
    needs: ci

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install Python deps
        run: pip install -r scripts/requirements.txt -r scripts/requirements-dev.txt

      - name: Install Supabase CLI
        run: npm install -g supabase@latest

      - name: Start local Supabase stack (applies all migrations)
        run: supabase start
        # supabase start runs db reset automatically on first boot,
        # applying every migration in supabase/migrations/ from scratch.

      - name: Export Supabase local credentials
        run: |
          SUPABASE_URL=$(supabase status --output json | jq -r '.API_URL')
          SERVICE_ROLE_KEY=$(supabase status --output json | jq -r '.SERVICE_ROLE_KEY')
          echo "SUPABASE_URL=${SUPABASE_URL}" >> "$GITHUB_ENV"
          echo "SUPABASE_SERVICE_ROLE_KEY=${SERVICE_ROLE_KEY}" >> "$GITHUB_ENV"

      - name: Run integration tests
        run: pytest scripts/test_rpc_integration.py -m integration -v

      - name: Stop local Supabase stack
        if: always()
        run: supabase stop

  # ── Deploy migrations ────────────────────────────────────────────────────
  # Runs only on pushes to main (not PRs) after the ci job passes.
  # Prevents the class of bug where merged code references a DB function
  # that was never deployed (root cause of #204).
  deploy-migrations:
    name: Push migrations to production
    runs-on: ubuntu-latest
    needs: [ci, integration]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Install Supabase CLI
        run: npm install -g supabase@latest

      - name: Link project
        run: supabase link --project-ref iybfarqvntkkfxwbrxll
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}

      - name: Push migrations to production
        run: supabase db push
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
