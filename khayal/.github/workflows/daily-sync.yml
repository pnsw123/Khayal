name: Daily Sync

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('scripts/requirements.txt', 'scripts/requirements-ml.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install sync dependencies
        run: pip install -r scripts/requirements.txt

      - name: Run daily sync
        run: python scripts/daily_sync.py
        env:
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          TMDB_API_KEY:         ${{ secrets.TMDB_API_KEY }}

      - name: Install ML dependencies
        run: pip install -r scripts/requirements-ml.txt

      - name: Train recommendation model
        run: python scripts/train_recommendations.py
        env:
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

      - name: Run SVD recommendation training (scikit-surprise)
        run: python scripts/surprise_train.py
        env:
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
