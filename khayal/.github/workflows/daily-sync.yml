name: Daily Sync

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('scripts/requirements.txt', 'scripts/requirements-ml.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install sync dependencies
        run: pip install -r scripts/requirements.txt

      - name: Clean Python bytecode cache
        run: find . -type d -name __pycache__ -exec rm -rf {} + 2>/dev/null || true

      - name: Run daily sync
        run: python scripts/daily_sync.py
        env:
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          TMDB_API_KEY:         ${{ secrets.TMDB_API_KEY }}

      - name: Install ML dependencies
        run: pip install -r scripts/requirements-ml.txt

      - name: Train recommendation model
        run: python scripts/train_recommendations.py
        env:
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

      - name: Run SVD recommendation training (scikit-surprise)
        run: python scripts/surprise_train.py
        env:
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

      - name: Notify on failure — open GitHub issue
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const title = `[CI] Daily sync failed — ${new Date().toISOString().slice(0, 10)}`;
            const body = [
              `## Daily Sync Failure`,
              ``,
              `**Run:** [${context.runId}](${runUrl})`,
              `**Triggered by:** \`${context.eventName}\``,
              `**Branch:** \`${context.ref}\``,
              `**Commit:** \`${context.sha.slice(0, 7)}\``,
              ``,
              `One or more steps in the daily sync workflow exited with a non-zero status.`,
              `Check the run logs linked above for details.`,
            ].join('\n');
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels: ['bug', 'ci-failure'],
            });
