name: Daily Sync

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install sync dependencies
        run: pip install python-dotenv supabase tmdbv3api python-slugify

      - name: Run daily sync
        run: python scripts/daily_sync.py
        env:
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          TMDB_API_KEY:         ${{ secrets.TMDB_API_KEY }}

      - name: Train recommendation model
        run: |
          pip install cornac pandas supabase python-dotenv
          python scripts/train_recommendations.py
        env:
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}

      - name: Run SVD recommendation training (scikit-surprise)
        run: |
          pip install "scikit-surprise" "pandas" "supabase" "python-dotenv" "numpy<2"
          python scripts/surprise_train.py
        env:
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
