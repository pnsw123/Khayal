name: Check Type Drift

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Run daily after the daily-sync to catch schema drift immediately
    - cron: "30 3 * * *"
  workflow_dispatch:

jobs:
  check-types:
    name: Verify database.types.ts matches live schema
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Supabase CLI
        run: npm install -g supabase@latest

      - name: Generate types from live schema
        run: |
          supabase gen types typescript \
            --project-id iybfarqvntkkfxwbrxll \
            --schema public \
            > /tmp/database.types.generated.ts
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Compare generated types with committed types
        run: |
          # Strip the comment header (first 10 lines) before diffing so that
          # date-only changes in the header don't flag as drift.
          tail -n +11 /tmp/database.types.generated.ts > /tmp/generated-body.ts
          tail -n +11 src/lib/database.types.ts > /tmp/committed-body.ts

          if ! diff -q /tmp/generated-body.ts /tmp/committed-body.ts > /dev/null 2>&1; then
            echo "::error::database.types.ts is out of sync with the live schema."
            echo "Run: npx supabase gen types typescript --project-id iybfarqvntkkfxwbrxll > src/lib/database.types.ts"
            diff /tmp/generated-body.ts /tmp/committed-body.ts || true
            exit 1
          fi

          echo "Types are in sync with live schema."
