[tool.mypy]
python_version = "3.11"
strict = true
files = ["scripts/"]
exclude = ["node_modules/", ".next/"]

# Allow untyped third-party libraries that don't ship stubs
ignore_missing_imports = true

[tool.ruff]
target-version = "py311"
line-length = 100
src = ["scripts"]

[tool.ruff.lint]
select = [
  "E",   # pycodestyle errors
  "W",   # pycodestyle warnings
  "F",   # pyflakes
  "I",   # isort
  "B",   # flake8-bugbear
  "C4",  # flake8-comprehensions
  "UP",  # pyupgrade
  "S",   # bandit / flake8-bandit
]
ignore = [
  "S301",  # pickle allowed (model serialisation)
  "S403",  # pickle import allowed
]

[tool.ruff.lint.per-file-ignores]
"scripts/test_*.py" = [
  "S101",  # assert statements OK in tests
]

[tool.pytest.ini_options]
testpaths = ["scripts"]
python_files = ["test_*.py"]
python_functions = ["test_*"]
markers = [
  "integration: marks tests that require live Supabase (deselect with -m 'not integration')",
]

[tool.bandit]
targets = ["scripts/"]
exclude_dirs = ["scripts/test_*.py"]
skips = ["B301", "B403"]  # pickle usage is intentional
