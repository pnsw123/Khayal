name: Daily TMDB Sync

on:
  schedule:
    - cron: "0 3 * * *"   # 3:00 AM UTC every day, forever
  workflow_dispatch:        # lets you trigger manually from GitHub UI any time

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: scripts/requirements.txt

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Run daily sync
        env:
          TMDB_API_KEY:              ${{ secrets.TMDB_API_KEY }}
          SUPABASE_PROJECT_REF:      ${{ secrets.SUPABASE_PROJECT_REF }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: python scripts/daily_sync.py --days 2

      - name: Run tests (prove nothing broke)
        env:
          TMDB_API_KEY:              ${{ secrets.TMDB_API_KEY }}
          SUPABASE_PROJECT_REF:      ${{ secrets.SUPABASE_PROJECT_REF }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          pip install pytest -q
          python -m pytest scripts/test_daily_sync.py -v
